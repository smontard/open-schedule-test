name: CI

on:
  pull_request:
    branches: [main]

env:
  DOCKER_API_VERSION: "1.44"

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
        
      - name: Apercu
        id: apercu
        uses: dev-celer/apercu-action@dev
        env:
          NEON_PROJECT_ID: ${{ secrets.project_id }}
          NEON_API_KEY: ${{ secrets.api_key }}
        with:
          debug: true

      - name: Print URL
        shell: bash
        run: echo "DATABASE_URL=${{ fromJson(steps.apercu.outputs.database_connections).app.url }}"
